# ──────────────────────────────────────────────────
# CI/CD Pipeline: Build → Push to ACR → Deploy to AKS
# Triggered on push to main branch
# ──────────────────────────────────────────────────
name: Build and Deploy to AKS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

    # ── 1. Checkout source code ──────────────────────
    - name: Checkout code
      uses: actions/checkout@v4

    # ── 2. Log in to ACR using Admin credentials ─────
    # No Service Principal needed — uses the Admin user
    # enabled on your ACR (Access keys page in Portal).
    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # ── 3. Build and push the Docker image ───────────
    - name: Build and Push Docker Image
      run: |
        docker build \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/courses-api:${{ github.sha }} \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/courses-api:latest \
          -f CoursesPlatform.API/Dockerfile .

        docker push ${{ secrets.ACR_LOGIN_SERVER }}/courses-api:${{ github.sha }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/courses-api:latest

    # ── 4. Authenticate to AKS via kubeconfig ────────
    # Uses the raw kubeconfig file you saved as a secret.
    # No az login / Service Principal required.
    - name: Set up Kubernetes context
      uses: azure/k8s-set-context@v4
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBECONFIG_SECRET }}

    # ── 5. Roll out the new image ─────────────────────
    - name: Deploy to AKS
      run: |
        kubectl set image deployment/courses-api \
          courses-api=${{ secrets.ACR_LOGIN_SERVER }}/courses-api:${{ github.sha }}

        kubectl rollout status deployment/courses-api --timeout=180s

    # ── 6. Quick sanity check ─────────────────────────
    - name: Verify deployment
      run: |
        kubectl get pods -l app=courses-api
        kubectl get svc courses-api-service
